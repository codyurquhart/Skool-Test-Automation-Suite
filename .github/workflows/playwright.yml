name: Playwright CI

on:
  pull_request:
    branches: [main, master]

jobs:
  playwright:
    name: Playwright tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Skip Percy-tagged tests here — they run under `percy exec` in the Percy job
      - name: Run Playwright tests
        env:
          # CUSTOMIZE: add repository variable BASE_URL, or change the default URL below
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{secrets.API_BASE_URL}}
          USER_EMAIL: ${{secrets.USER_EMAIL}}
          USER_PASSWORD: ${{secrets.USER_PASSWORD}}
        run: npx playwright test --grep-invert "@percy"

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  percy:
    name: Percy visual tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Percy + Playwright
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
          BASE_URL: ${{ vars.BASE_URL || 'https://example.com' }}
        run: npm run percy -- --grep "@percy"

      - name: Upload Playwright HTML report (Percy job)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-percy
          path: playwright-report/
          retention-days: 14
